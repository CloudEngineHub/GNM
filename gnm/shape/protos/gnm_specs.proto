syntax = "proto3";

package gnm.shape;

option java_multiple_files = true;
option java_outer_classname = "GNMSpecsProto";

// Specifications of a GNM model.
// The fields correspond to the enums defined in gnm_specs.py generated by
// //third_party/py/gnm/shape/data/versions/BUILD.
message GNMSpecs {
  string version = 1;  // GNMVersion, e.g. "3.0".
  string variant = 2;  // GNMVariant, e.g. "head".
}
